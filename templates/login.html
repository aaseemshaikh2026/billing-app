<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Billing Management System</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-container { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 40px rgba(0,0,0,0.3); width: 100%; max-width: 420px; }
        h1 { color: #366092; text-align: center; margin-bottom: 5px; }
        .subtitle { text-align: center; color: #666; margin-bottom: 25px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; color: #333; font-weight: 600; font-size: 0.9em; }
        input { width: 100%; padding: 11px; border: 2px solid #ddd; border-radius: 5px; font-size: 1em; }
        input:focus { outline: none; border-color: #366092; }
        button { width: 100%; padding: 12px; background: #366092; color: white; border: none; border-radius: 5px; font-size: 1em; font-weight: 600; cursor: pointer; transition: all 0.3s; }
        button:hover { background: #2d4a73; }
        .btn-secondary { background: #6c757d; margin-top: 10px; }
        .btn-secondary:hover { background: #5a6268; }
        .error { background: #dc3545; color: white; padding: 10px; border-radius: 5px; margin-bottom: 15px; display: none; }
        .success { background: #28a745; color: white; padding: 10px; border-radius: 5px; margin-bottom: 15px; display: none; }
        .links { text-align: center; margin-top: 15px; }
        .links a { color: #366092; text-decoration: none; font-size: 0.9em; }
        .links a:hover { text-decoration: underline; }
        .hidden { display: none; }
        .pw-wrap { position: relative; width: 100%; }
        .pw-wrap input { padding-right: 38px; }
        .pw-eye { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; padding: 0; width: auto; font-size: 1.1em; color: #888; }
        .pw-eye:hover { color: #366092; }
    </style>
</head>
<body>
    <div class="login-container">
        <h1>💼 Billing System</h1>
        <p class="subtitle" id="pageSubtitle">Login to your account</p>

        <div id="error" class="error"></div>
        <div id="success" class="success"></div>

        <!-- LOGIN FORM -->
        <form id="loginForm" autocomplete="off">
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="loginUsername" required autofocus autocomplete="off">
            </div>
            <div class="form-group">
                <label>Password</label>
                <div class="pw-wrap"><input type="password" id="loginPassword" required autocomplete="off"><span class="pw-eye" onclick="togglePw('loginPassword',this)">👁️</span></div>
            </div>
            <button type="submit">Login</button>
            <div class="links">
                <a href="#" onclick="showPanel('register')">Create Account</a> &nbsp;|&nbsp;
                <a href="#" onclick="showPanel('forgot')">Forgot Password?</a>
            </div>
        </form>

        <!-- REGISTER FORM -->
        <form id="registerForm" class="hidden" autocomplete="off">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="regFullName" required autocomplete="off">
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="regEmail" required autocomplete="off">
            </div>
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="regUsername" required autocomplete="off">
            </div>
            <div class="form-group">
                <label>Password</label>
                <div class="pw-wrap"><input type="password" id="regPassword" required autocomplete="new-password" oninput="checkPasswordStrength(this.value)"><span class="pw-eye" onclick="togglePw('regPassword',this)">👁️</span></div>
                <div id="pwStrength" style="font-size:0.8em;margin-top:5px;color:#666;"></div>
                <div style="font-size:0.75em;color:#888;margin-top:3px;">Min 8 chars, 1 uppercase, 1 lowercase, 1 number, 1 special char. Must not contain your name.</div>
            </div>
            <button type="submit">Create Account</button>
            <div class="links"><a href="#" onclick="showPanel('login')">Back to Login</a></div>
        </form>

        <!-- OTP VERIFICATION FORM -->
        <form id="otpForm" class="hidden">
            <div style="text-align:center;margin-bottom:15px;">
                <div style="font-size:2em;">📧</div>
                <p id="otpMessage" style="color:#666;margin-top:10px;">Enter the 6-digit code sent to your email</p>
            </div>
            <div class="form-group">
                <label>Verification Code</label>
                <input type="text" id="otpCode" maxlength="6" placeholder="000000" required autocomplete="off" style="text-align:center;font-size:1.5em;letter-spacing:8px;">
            </div>
            <button type="submit">Verify & Create Account</button>
            <button type="button" onclick="resendOTP()" class="btn-secondary">Resend Code</button>
            <div class="links"><a href="#" onclick="showPanel('register')">Back</a></div>
        </form>

        <!-- FORGOT PASSWORD FORM -->
        <div id="forgotForm" class="hidden">
            <form id="forgotStep1">
                <div class="form-group">
                    <label>Enter Your Username</label>
                    <input type="text" id="forgotUsername" required autocomplete="off">
                </div>
                <button type="submit">Continue</button>
                <div class="links"><a href="#" onclick="showPanel('login')">Back to Login</a></div>
            </form>
        </div>

        <!-- SECURITY QUESTIONS FORM -->
        <form id="securityForm" class="hidden">
            <div class="form-group">
                <label id="sq1Label">Question 1</label>
                <input type="text" id="forgotAnswer1" required autocomplete="off">
            </div>
            <div class="form-group">
                <label id="sq2Label">Question 2</label>
                <input type="text" id="forgotAnswer2" required autocomplete="off">
            </div>
            <div class="form-group">
                <label>New Password</label>
                <div class="pw-wrap"><input type="password" id="forgotNewPassword" required autocomplete="new-password"><span class="pw-eye" onclick="togglePw('forgotNewPassword',this)">👁️</span></div>
            </div>
            <button type="submit">Reset Password</button>
            <div class="links"><a href="#" onclick="showPanel('login')">Back to Login</a></div>
        </form>
    </div>

    <script>
        let resetUsername = '';
        let otpEmail = '';

        function togglePw(id, btn) {
            const i = document.getElementById(id);
            const show = i.type === 'password';
            i.type = show ? 'text' : 'password';
            btn.textContent = show ? '🙈' : '👁️';
        }

        function showPanel(panel) {
            ['loginForm','registerForm','forgotForm','securityForm','otpForm'].forEach(id => document.getElementById(id).classList.add('hidden'));
            document.getElementById('error').style.display = 'none';
            document.getElementById('success').style.display = 'none';
            const titles = {login:'Login to your account',register:'Create a new account',forgot:'Reset your password',security:'Answer security questions',otp:'Verify your email'};
            document.getElementById('pageSubtitle').textContent = titles[panel] || '';
            const formMap = {login:'loginForm',register:'registerForm',forgot:'forgotForm',security:'securityForm',otp:'otpForm'};
            if (formMap[panel]) document.getElementById(formMap[panel]).classList.remove('hidden');
        }

        function checkPasswordStrength(pw) {
            const el = document.getElementById('pwStrength');
            let score = 0;
            if (pw.length >= 8) score++;
            if (/[A-Z]/.test(pw)) score++;
            if (/[a-z]/.test(pw)) score++;
            if (/[0-9]/.test(pw)) score++;
            if (/[!@#$%^&*(),.?":{}|<>]/.test(pw)) score++;
            const labels = ['','❌ Very Weak','❌ Weak','⚠️ Fair','✅ Good','✅ Strong'];
            const clrs = ['','#dc3545','#dc3545','#ffc107','#28a745','#28a745'];
            el.textContent = labels[score] || ''; el.style.color = clrs[score] || '#666';
            const name = document.getElementById('regFullName').value.trim();
            if (name && pw) {
                for (const part of name.split(/\s+/)) {
                    if (part.length >= 2 && pw.toLowerCase().includes(part.toLowerCase())) {
                        el.textContent = '❌ Password must not contain your name';
                        el.style.color = '#dc3545'; break;
                    }
                }
            }
        }

        function showError(msg) { const e = document.getElementById('error'); e.textContent = msg; e.style.display = 'block'; }
        function showSuccess(msg) { const e = document.getElementById('success'); e.textContent = msg; e.style.display = 'block'; }

        async function postJSON(url, data) {
            const r = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) });
            return { ok: r.ok, data: await r.json() };
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const res = await postJSON('/login', { username: document.getElementById('loginUsername').value, password: document.getElementById('loginPassword').value });
            if (res.data.success) { window.location.href = '/'; } else { showError(res.data.error || 'Invalid credentials'); }
        });

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const res = await postJSON('/register', {
                full_name: document.getElementById('regFullName').value,
                email: document.getElementById('regEmail').value,
                username: document.getElementById('regUsername').value,
                password: document.getElementById('regPassword').value
            });
            if (res.data.otp_required) {
                otpEmail = res.data.email;
                document.getElementById('otpMessage').textContent = res.data.message;
                showPanel('otp');
            } else if (res.data.success) { window.location.href = '/'; }
            else { showError(res.data.error || 'Registration failed'); }
        });

        document.getElementById('otpForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const res = await postJSON('/api/verify-otp', { email: otpEmail, otp: document.getElementById('otpCode').value });
            if (res.data.success) { window.location.href = '/'; } else { showError(res.data.error || 'Verification failed'); }
        });

        async function resendOTP() {
            const res = await postJSON('/api/resend-otp', { email: otpEmail });
            if (res.ok) { showSuccess(res.data.message); } else { showError(res.data.error); }
        }

        document.getElementById('forgotStep1').addEventListener('submit', async (e) => {
            e.preventDefault();
            resetUsername = document.getElementById('forgotUsername').value;
            const res = await postJSON('/api/forgot-password', { username: resetUsername });
            if (res.ok) {
                document.getElementById('sq1Label').textContent = res.data.question_1;
                document.getElementById('sq2Label').textContent = res.data.question_2;
                showPanel('security');
            } else { showError(res.data.error || 'User not found'); }
        });

        document.getElementById('securityForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const res = await postJSON('/api/reset-password', {
                username: resetUsername,
                answer_1: document.getElementById('forgotAnswer1').value,
                answer_2: document.getElementById('forgotAnswer2').value,
                new_password: document.getElementById('forgotNewPassword').value
            });
            if (res.ok) { showPanel('login'); showSuccess('Password reset! Please login.'); } else { showError(res.data.error || 'Reset failed'); }
        });
    </script>
</body>
</html>
